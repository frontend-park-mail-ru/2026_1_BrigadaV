proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=api_cache:10m max_size=1g;

server {
    listen 80;
    server_name guidely.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen 443 quic reuseport;

    server_name guidely.ru;

    ssl_protocols TLSv1.3;
    ssl_early_data on;
    ssl_certificate /etc/letsencrypt/live/guidely.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/guidely.ru/privkey.pem;

    http2 on;
    http3 on;
    quic_retry on;
    quic_gso on;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    gzip_proxied any;
    gzip_min_length 1000;

    gzip_static on;

    add_header Alt-Svc 'h3=":443"; ma=86400' always;
    add_header Cache-Control "no-store";

    location / {
        add_header Alt-Svc 'h3=":443"; ma=86400' always;
        add_header Cache-Control "public, no-cache";

        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /uploads/ {
        add_header Alt-Svc 'h3=":443"; ma=86400' always;
        add_header Cache-Control "public, immutable, no-transform";
        expires 1y;

        proxy_pass http://backend:8080/uploads/;
    }

    location /api/ {
        add_header Alt-Svc 'h3=":443"; ma=86400' always;
        add_header Cache-Control "no-store";

        proxy_pass http://backend:8080/api/;
    }

    location /api/places {
        add_header Alt-Svc 'h3=":443"; ma=86400' always;
        add_header X-Cache-Status $upstream_cache_status;

        proxy_cache api_cache;
        proxy_cache_valid 200 1s;
        proxy_cache_use_stale error timeout updating http_500;

        proxy_pass http://backend:8080/api/places;
    }

    location ~ ^/(assets|fonts|icons|mock)/ {
        add_header Alt-Svc 'h3=":443"; ma=86400' always;
        add_header Cache-Control "public, immutable, no-transform";
        expires 1y;

        root /usr/share/nginx/html;
    }
}
