<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guidely | Регистрация</title>

  <link rel="stylesheet" href="./style.scss">
  <meta name="color-scheme" content="light">
</head>

<body id="root">
  <header class="header">
    <a class="header__name" href="#">Guidely</a>
    <div class="header__account">
      <label for="log-in-button" class="header__prompt">Уже есть аккаунт?</label>
      <button id="log-in-button" class="header__log-in">Войти</button>
    </div>
  </header>

  <main class="main sign-up">
    <form class="sign-up__widget sign-up-box">
      <h4 class="sign-up-box__title">Вход в аккаунт</h4>

      <div class="sign-up-box__fields">
        <div class="sign-up-box__field form-field form-field--error">
          <label class="form-field__label" for="login-input">Введите логин</label>
          <input type="email" id="login-input" class="form-field__input" placeholder="Логин" autocomplete="email">

          <div class="form-field__error-wrapper">
            <img src="/icons/alert-error.svg">
            <span class="form-field__message">Эта почта уже зарегистрирована</span>
          </div>
        </div>

        <div class="sign-up-box__field form-field form-field--error">
          <label class="form-field__label" for="password-input">Введите пароль</label>
          <div class="form-field__input-wrapper">
            <input type="password" id="password-input" class="form-field__input" placeholder="Пароль" minlength="8"
              autocomplete="current-password">
            <button type="button" class="form-field__icon">
              <img src="/icons/eye.svg">
            </button>
          </div>
          <div class="form-field__note-wrapper">
            <span class="form-field__note">Используйте не менее 8 символов</span>
          </div>
          <div class="form-field__error-wrapper">
            <img src="/icons/alert-error.svg">
            <span class="form-field__message">Пароль неверный</span>
          </div>
        </div>

        <div class="sign-up-box__field form-field form-field--error">
          <label class="form-field__label" for="password-repeat-input">Повторите пароль</label>
          <div class="form-field__input-wrapper">
            <input type="password" id="password-repeat-input" class="form-field__input" placeholder="Пароль"
              minlength="8">
            <button type="button" class="form-field__icon">
              <img src="/icons/eye.svg">
            </button>
          </div>
          <div class="form-field__error-wrapper">
            <img src="/icons/alert-error.svg">
            <span class="form-field__message">Пароль неверный</span>
          </div>
        </div>
      </div>

      <div class="sign-up-box__actions">
        <button class="sign-up-box__sign-up">Создать аккаунт</button>
        <button class="sign-up-box__log-in">Войти</button>
      </div>

      <hr class="sign-up-box__separator">

      <div class="sign-up-box__sso-auth">

        <button class="sign-up-box__vk-auth button-oauth" disabled>
          <img src="/icons/vk.svg" class="button-oauth__icon">
          <span class="button-oauth__text">Войти через VK</span>
        </button>

        <button class="sign-up-box__yandex-auth button-oauth" disabled>
          <img src="/icons/yandex.svg" class="button-oauth__icon">
          <span class="button-oauth__text">Войти с Яндекс ID</span>
        </button>
      </div>
    </form>
  </main>

</body>

</html>
