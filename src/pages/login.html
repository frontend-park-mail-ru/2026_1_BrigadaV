<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guidely | Вход</title>

  <link rel="stylesheet" href="./style.scss">
  <meta name="color-scheme" content="light">
</head>

<body id="root">
  <header class="header">
    <a class="header__name" href="#">Guidely</a>
    <div class="header__account">
      <label for="sign-up-button" class="header__prompt">Ещё нет аккаунта?</label>
      <button id="sign-up-button" class="header__sign-up">Регистрация</button>
    </div>
  </header>

  <main class="main log-in">
    <form class="log-in__widget log-in-box">
      <h4 class="log-in-box__title">Вход в аккаунт</h4>

      <div class="log-in-box__fields">
        <div class="log-in-box__field form-field">
          <label class="form-field__label" for="login-input">Введите логин</label>
          <input type="email" id="login-input" class="form-field__input" placeholder="Логин" autocomplete="email">
        </div>

        <div class="log-in-box__field form-field form-field--error">
          <label class="form-field__label" for="password-input">Введите пароль</label>
          <div class="form-field__input-wrapper">
            <input type="password" id="password-input" class="form-field__input" placeholder="Пароль" minlength="8"
              autocomplete="current-password">
            <button type="button" class="form-field__icon">
              <svg width="24" height="24" viewBox="0 0 19 14" fill="none" xmlns="http://www.w3.org/2000/svg">

                  fill="black" />
              </svg>
            </button>
          </div>
          <div class="form-field__message-wrapper">
            <span class="form-field__massage-icon-box">
              <svg class="form-field__message-icon" width="24" height="24" viewBox="0 0 23 21" fill="none"
                xmlns="http://www.w3.org/2000/svg">
                <path
                  d="M11.3961 12.25C11.1613 12.25 10.9318 12.3141 10.7366 12.4343C10.5414 12.5545 10.3892 12.7253 10.2994 12.9252C10.2095 13.125 10.186 13.345 10.2318 13.5571C10.2776 13.7693 10.3907 13.9642 10.5567 14.1171C10.7227 14.2701 10.9342 14.3743 11.1645 14.4165C11.3948 14.4587 11.6335 14.437 11.8504 14.3542C12.0673 14.2715 12.2527 14.1313 12.3831 13.9514C12.5136 13.7715 12.5832 13.5601 12.5832 13.3438C12.5832 13.0537 12.4581 12.7755 12.2355 12.5704C12.0129 12.3652 11.7109 12.25 11.3961 12.25ZM11.3961 10.9375C11.648 10.9375 11.8895 10.8453 12.0676 10.6812C12.2457 10.5171 12.3458 10.2946 12.3458 10.0625V7.4375C12.3458 7.20544 12.2457 6.98288 12.0676 6.81878C11.8895 6.65469 11.648 6.5625 11.3961 6.5625C11.1442 6.5625 10.9027 6.65469 10.7246 6.81878C10.5465 6.98288 10.4464 7.20544 10.4464 7.4375V10.0625C10.4464 10.2946 10.5465 10.5171 10.7246 10.6812C10.9027 10.8453 11.1442 10.9375 11.3961 10.9375ZM11.3961 1.75C9.51784 1.75 7.68175 2.26318 6.12003 3.22464C4.55831 4.1861 3.34109 5.55267 2.62231 7.15152C1.90353 8.75037 1.71546 10.5097 2.08189 12.207C2.44833 13.9044 3.3528 15.4635 4.68093 16.6872C6.00907 17.9109 7.70122 18.7443 9.5434 19.0819C11.3856 19.4195 13.295 19.2462 15.0303 18.5839C16.7656 17.9217 18.2488 16.8002 19.2923 15.3612C20.3358 13.9223 20.8928 12.2306 20.8928 10.5C20.8903 8.18007 19.8889 5.95582 18.1085 4.31537C16.3281 2.67493 13.914 1.75232 11.3961 1.75ZM11.3961 17.5C9.8935 17.5 8.42462 17.0895 7.17525 16.3203C5.92587 15.5511 4.9521 14.4579 4.37707 13.1788C3.80205 11.8997 3.65159 10.4922 3.94474 9.13437C4.23788 7.7765 4.96146 6.52922 6.02397 5.55025C7.08648 4.57129 8.4402 3.9046 9.91394 3.6345C11.3877 3.36441 12.9153 3.50303 14.3035 4.03284C15.6917 4.56266 16.8783 5.45986 17.7131 6.61101C18.5479 7.76215 18.9935 9.11553 18.9935 10.5C18.9909 12.3558 18.1897 14.1349 16.7655 15.4472C15.3412 16.7594 13.4103 17.4977 11.3961 17.5Z"
                  fill="black" />
              </svg>
            </span>
            <span class="form-field__message">Пароль неверный</span>
          </div>
        </div>
      </div>

      <div class="log-in-box__actions">
        <button class="log-in-box__log-in">Войти</button>
        <button class="log-in-box__sign-up">Создать аккаунт</button>
      </div>

      <hr class="log-in-box__separator">

      <div class="log-in-box__sso-auth">

        <button class="log-in-box__vk-auth button" disabled>

            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <g clip-path="url(#clip0_418_1280)">
                <mask id="mask0_418_1280" style="mask-type:luminance" maskUnits="userSpaceOnUse" x="0" y="0" width="24"
                  height="24">
                  <path d="M23.8796 0H0.117188V24H23.8796V0Z" fill="white" />
                </mask>
                <g mask="url(#mask0_418_1280)">
                  <path
                    d="M0.117188 11.52C0.117188 6.08942 0.117188 3.37414 1.78755 1.68707C3.45792 0 6.14632 0 11.5231 0H12.4736C17.8504 0 20.5388 0 22.2092 1.68707C23.8796 3.37414 23.8796 6.08942 23.8796 11.52V12.48C23.8796 17.9106 23.8796 20.6259 22.2092 22.3129C20.5388 24 17.8504 24 12.4736 24H11.5231C6.14632 24 3.45792 24 1.78755 22.3129C0.117188 20.6259 0.117188 17.9106 0.117188 12.48V11.52Z"
                    fill="white" />
                  <path
                    d="M12.7626 17.2908C7.34671 17.2908 4.25763 13.5408 4.12891 7.30078H6.84179C6.93089 11.8808 8.93085 13.8208 10.515 14.2208V7.30078H13.0695V11.2507C14.6339 11.0808 16.2773 9.28078 16.8317 7.30078H19.3863C18.9605 9.74079 17.1783 11.5408 15.911 12.2808C17.1783 12.8808 19.2081 14.4508 19.9804 17.2908H17.1684C16.5645 15.3908 15.0596 13.9208 13.0695 13.7208V17.2908H12.7626Z"
                    fill="#0077FF" />
                </g>
              </g>
              <defs>
                <clipPath id="clip0_418_1280">
                  <rect width="24" height="24" fill="white" />
                </clipPath>
              </defs>
            </svg>
          </span>
          <span class="button__text">Войти через VK</span>
        </button>

        <button class="log-in-box__yandex-auth button" disabled>
          <span class="button__icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect width="24" height="24" rx="12" fill="#FC3F1D" />
              <path
                d="M15.5464 18.0546H13.431V7.58375H12.4863C10.7567 7.58375 9.85201 8.44855 9.85201 9.73911C9.85201 11.2026 10.4773 11.8812 11.7679 12.746L12.8323 13.4644L9.77218 18.0546H7.49707L10.2511 13.9567C8.66789 12.8258 7.77647 11.7215 7.77647 9.85885C7.77647 7.53053 9.39964 5.94727 12.473 5.94727H15.5331V18.0546H15.5464Z"
                fill="white" />

          </span>
          <span class="button__text">Войти с Яндекс ID</span>

      </div>
    </form>
  </main>

</body>

</html>
